<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden of Habits</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050d07;
            --bg-base: #0a1a0f;
            --bg-elevated: #122118;
            --card-bg: #162a1e;
            --card-border: #1f3d28;
            --fg: #f0ebe3;
            --fg-muted: #8fa396;
            --accent: #c9a227;
            --accent-glow: rgba(201, 162, 39, 0.3);
            --success: #4ade80;
            --soil: #3d2817;
            --soil-light: #5a3d22;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--fg);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Background atmosphere */
        .bg-atmosphere {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: 
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(34, 197, 94, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(201, 162, 39, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse 50% 30% at 10% 60%, rgba(34, 197, 94, 0.04) 0%, transparent 50%);
        }

        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L35 15 L30 12 L25 15 Z' fill='%234ade80' fill-opacity='1'/%3E%3Ccircle cx='30' cy='30' r='1' fill='%234ade80' fill-opacity='0.5'/%3E%3C/svg%3E");
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-top: 2rem;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), #8b7355);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .logo-icon svg {
            width: 28px;
            height: 28px;
            color: var(--bg-deep);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--fg);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--fg-muted);
            margin-top: 0.5rem;
            font-weight: 400;
        }

        /* Input section */
        .input-section {
            background: var(--bg-elevated);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 3rem;
            position: relative;
            overflow: hidden;
        }

        .input-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        .input-wrapper {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .input-field {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .input-field input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: var(--bg-base);
            border: 2px solid var(--card-border);
            border-radius: 12px;
            color: var(--fg);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .input-field input::placeholder {
            color: var(--fg-muted);
        }

        .input-field input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .btn-add {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--accent), #a88520);
            border: none;
            border-radius: 12px;
            color: var(--bg-deep);
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        .btn-add:active {
            transform: translateY(0);
        }

        .btn-add:focus-visible {
            outline: 2px solid var(--fg);
            outline-offset: 2px;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
            padding: 1rem 1.5rem;
            background: var(--bg-elevated);
            border-radius: 12px;
            border: 1px solid var(--card-border);
            min-width: 120px;
        }

        .stat-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--fg-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Habits grid */
        .habits-section h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--fg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .habits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* Habit card */
        .habit-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .habit-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--card-border), var(--accent), var(--card-border));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .habit-card:hover::before {
            opacity: 1;
        }

        .habit-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(201, 162, 39, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .habit-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--fg);
            word-break: break-word;
            padding-right: 0.5rem;
        }

        .btn-delete {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .btn-delete:focus-visible {
            outline: 2px solid #ef4444;
            outline-offset: 2px;
        }

        .btn-delete svg {
            width: 16px;
            height: 16px;
            color: #ef4444;
        }

        /* Plant pot */
        .plant-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 1.5rem 0;
        }

        .plant-display {
            font-size: 4rem;
            line-height: 1;
            margin-bottom: 0.5rem;
            transition: all 0.1s ease;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        .plant-display.growing {
            animation: plantGrow 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes plantGrow {
            0% {
                transform: scale(1) rotate(0deg);
            }
            30% {
                transform: scale(1.3) rotate(-5deg);
            }
            50% {
                transform: scale(1.2) rotate(5deg);
            }
            70% {
                transform: scale(1.15) rotate(-3deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
            }
        }

        .pot {
            width: 80px;
            height: 50px;
            background: linear-gradient(180deg, var(--soil-light) 0%, var(--soil) 100%);
            border-radius: 0 0 20px 20px;
            position: relative;
            box-shadow: 
                inset 0 -10px 20px rgba(0, 0, 0, 0.3),
                0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .pot::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -5px;
            right: -5px;
            height: 12px;
            background: linear-gradient(180deg, #6b4423, var(--soil-light));
            border-radius: 4px;
        }

        .pot::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 10px;
            right: 10px;
            height: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
        }

        /* Progress section */
        .progress-section {
            margin-top: 1rem;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .water-count {
            color: var(--fg-muted);
        }

        .next-stage {
            color: var(--accent);
            font-weight: 500;
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-base);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--accent));
            border-radius: 3px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Water button */
        .btn-water {
            width: 100%;
            margin-top: 1.25rem;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-water::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .btn-water:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-water:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.3);
        }

        .btn-water:active {
            transform: translateY(0);
        }

        .btn-water:focus-visible {
            outline: 2px solid var(--success);
            outline-offset: 2px;
        }

        .btn-water svg {
            width: 20px;
            height: 20px;
        }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: var(--bg-elevated);
            border: 2px dashed var(--card-border);
            border-radius: 20px;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--fg);
        }

        .empty-text {
            color: var(--fg-muted);
        }

        /* Water drop animation */
        .water-drop {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            animation: dropFall 0.8s ease-in forwards;
        }

        @keyframes dropFall {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(60px) scale(0.5);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 1rem;
            }

            header {
                padding-top: 1rem;
                margin-bottom: 2rem;
            }

            .input-section {
                padding: 1.5rem;
            }

            .input-wrapper {
                flex-direction: column;
            }

            .btn-add {
                width: 100%;
                justify-content: center;
            }

            .stats-bar {
                gap: 1rem;
            }

            .stat {
                flex: 1;
                min-width: 100px;
            }

            .habits-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Entrance animations */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        .fade-in-delay-1 { animation-delay: 0.1s; }
        .fade-in-delay-2 { animation-delay: 0.2s; }
        .fade-in-delay-3 { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-enter {
            animation: cardEnter 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="bg-atmosphere"></div>
    <div class="bg-pattern"></div>

    <div class="container">
        <header class="fade-in">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22V8"/>
                        <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
                        <path d="M12 8a5 5 0 0 0 0 6"/>
                        <path d="M12 8a5 5 0 0 1 0 6"/>
                    </svg>
                </div>
            </div>
            <h1>Garden of Habits</h1>
            <p class="subtitle">Cultiva tus habitos, crece con ellos</p>
        </header>

        <section class="input-section fade-in fade-in-delay-1" aria-label="Agregar nuevo habito">
            <div class="input-wrapper">
                <div class="input-field">
                    <input 
                        type="text" 
                        id="habitInput" 
                        placeholder="Escribe un nuevo habito..." 
                        aria-label="Nombre del habito"
                        maxlength="50"
                    >
                </div>
                <button class="btn-add" id="addBtn" aria-label="Agregar habito">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Plantar semilla
                </button>
            </div>
        </section>

        <div class="stats-bar fade-in fade-in-delay-2" id="statsBar">
            <div class="stat">
                <div class="stat-value" id="totalHabits">0</div>
                <div class="stat-label">Habitos</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalWaters">0</div>
                <div class="stat-label">Riegos</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalTrees">0</div>
                <div class="stat-label">Arboles</div>
            </div>
        </div>

        <section class="habits-section fade-in fade-in-delay-3">
            <h2>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 22V12a10 10 0 0 1 20 0v10"/>
                    <path d="M12 22V8"/>
                    <path d="M2 12a10 10 0 0 1 10 0"/>
                    <path d="M22 12a10 10 0 0 0-10 0"/>
                </svg>
                Tu jardín
            </h2>
            <div class="habits-grid" id="habitsGrid" role="list" aria-label="Lista de habitos">
                <!-- Habits will be rendered here -->
            </div>
        </section>
    </div>

    <script>
        // Plant stages configuration
        const STAGES = [
            { emoji: '', name: 'tierra', threshold: 0 },
            { emoji: '\u{1F331}', name: 'brote', threshold: 1 },
            { emoji: '\u{1F33F}', name: 'planta', threshold: 5 },
            { emoji: '\u{1F333}', name: 'arbol', threshold: 10 }
        ];

        // State
        let habits = [];

        // DOM Elements
        const habitInput = document.getElementById('habitInput');
        const addBtn = document.getElementById('addBtn');
        const habitsGrid = document.getElementById('habitsGrid');
        const totalHabitsEl = document.getElementById('totalHabits');
        const totalWatersEl = document.getElementById('totalWaters');
        const totalTreesEl = document.getElementById('totalTrees');

        // Initialize
        function init() {
            loadHabits();
            renderHabits();
            updateStats();
            setupEventListeners();
        }

        // LocalStorage
        function loadHabits() {
            const stored = localStorage.getItem('gardenHabits');
            if (stored) {
                try {
                    habits = JSON.parse(stored);
                } catch (e) {
                    habits = [];
                }
            }
        }

        function saveHabits() {
            localStorage.setItem('gardenHabits', JSON.stringify(habits));
        }

        // Get current stage based on water count
        function getStage(waterCount) {
            let currentStage = STAGES[0];
            let nextStage = STAGES[1];

            for (let i = STAGES.length - 1; i >= 0; i--) {
                if (waterCount >= STAGES[i].threshold) {
                    currentStage = STAGES[i];
                    nextStage = STAGES[i + 1] || STAGES[i];
                    break;
                }
            }

            return { currentStage, nextStage };
        }

        // Calculate progress percentage
        function getProgress(waterCount) {
            const { currentStage, nextStage } = getStage(waterCount);

            if (currentStage.threshold === nextStage.threshold) {
                return 100;
            }

            const progress = ((waterCount - currentStage.threshold) / (nextStage.threshold - currentStage.threshold)) * 100;
            return Math.min(Math.max(progress, 0), 100);
        }

        // Create habit card HTML
        function createHabitCard(habit, animate = false) {
            const { currentStage, nextStage } = getStage(habit.waterCount);
            const progress = getProgress(habit.waterCount);
            const isMaxStage = currentStage.threshold === nextStage.threshold;

            const card = document.createElement('article');
            card.className = `habit-card${animate ? ' card-enter' : ''}`;
            card.dataset.id = habit.id;
            card.setAttribute('role', 'listitem');

            card.innerHTML = `
                <div class="card-header">
                    <h3 class="habit-name">${escapeHtml(habit.name)}</h3>
                    <button class="btn-delete" aria-label="Eliminar habito ${escapeHtml(habit.name)}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                    </button>
                </div>
                
                <div class="plant-container">
                    <div class="plant-display" data-water-count="${habit.waterCount}">
                        ${currentStage.emoji}
                    </div>
                    <div class="pot"></div>
                </div>

                <div class="progress-section">
                    <div class="progress-info">
                        <span class="water-count">${habit.waterCount} riegos</span>
                        <span class="next-stage">
                            ${isMaxStage ? 'Maximo alcanzado' : `${nextStage.name} en ${nextStage.threshold - habit.waterCount}`}
                        </span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%"></div>
                    </div>
                </div>

                <button class="btn-water" aria-label="Regar ${escapeHtml(habit.name)}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/>
                    </svg>
                    Regar
                </button>
            `;

            return card;
        }

        // Render all habits
        function renderHabits() {
            habitsGrid.innerHTML = '';

            if (habits.length === 0) {
                habitsGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"></div>
                        <h3 class="empty-title">Tu jardin esta vacio</h3>
                        <p class="empty-text">Planta tu primer habito para comenzar a cultivar</p>
                    </div>
                `;
                return;
            }

            habits.forEach(habit => {
                const card = createHabitCard(habit);
                habitsGrid.appendChild(card);
            });
        }

        // Add new habit
        function addHabit(name) {
            const trimmedName = name.trim();
            if (!trimmedName) return;

            const habit = {
                id: Date.now().toString(),
                name: trimmedName,
                waterCount: 0,
                createdAt: new Date().toISOString()
            };

            habits.unshift(habit);
            saveHabits();

            // Add card with animation
            const emptyState = habitsGrid.querySelector('.empty-state');
            if (emptyState) {
                habitsGrid.innerHTML = '';
            }

            const card = createHabitCard(habit, true);
            habitsGrid.insertBefore(card, habitsGrid.firstChild);

            updateStats();
            habitInput.value = '';
        }

        // Water habit
        function waterHabit(id) {
            const habit = habits.find(h => h.id === id);
            if (!habit) return;

            const oldStage = getStage(habit.waterCount).currentStage;
            habit.waterCount++;
            saveHabits();

            const newStage = getStage(habit.waterCount).currentStage;
            const card = habitsGrid.querySelector(`[data-id="${id}"]`);

            if (card) {
                // Update plant display
                const plantDisplay = card.querySelector('.plant-display');
                plantDisplay.textContent = newStage.emoji;
                plantDisplay.dataset.waterCount = habit.waterCount;

                // Animate if stage changed
                if (oldStage.threshold !== newStage.threshold) {
                    plantDisplay.classList.add('growing');
                    setTimeout(() => {
                        plantDisplay.classList.remove('growing');
                    }, 600);
                }

                // Update progress
                const { nextStage } = getStage(habit.waterCount);
                const progress = getProgress(habit.waterCount);
                const isMaxStage = newStage.threshold === nextStage.threshold;

                card.querySelector('.water-count').textContent = `${habit.waterCount} riegos`;
                card.querySelector('.next-stage').textContent = isMaxStage 
                    ? 'Maximo alcanzado' 
                    : `${nextStage.name} en ${nextStage.threshold - habit.waterCount}`;
                card.querySelector('.progress-fill').style.width = `${progress}%`;

                // Create water drop animation
                createWaterDrop(card);
            }

            updateStats();
        }

        // Delete habit
        function deleteHabit(id) {
            habits = habits.filter(h => h.id !== id);
            saveHabits();

            const card = habitsGrid.querySelector(`[data-id="${id}"]`);
            if (card) {
                card.style.opacity = '0';
                card.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    card.remove();
                    if (habits.length === 0) {
                        renderHabits();
                    }
                }, 300);
            }

            updateStats();
        }

        // Create water drop animation
        function createWaterDrop(card) {
            const btn = card.querySelector('.btn-water');
            const rect = btn.getBoundingClientRect();

            const drop = document.createElement('div');
            drop.className = 'water-drop';
            drop.innerHTML = '\u{1F4A7}';
            drop.style.cssText = `
                left: ${rect.left + rect.width / 2 - 10}px;
                top: ${rect.top - 30}px;
                font-size: 20px;
            `;

            document.body.appendChild(drop);

            setTimeout(() => {
                drop.remove();
            }, 800);
        }

        // Update stats
        function updateStats() {
            const totalWaters = habits.reduce((sum, h) => sum + h.waterCount, 0);
            const totalTrees = habits.filter(h => h.waterCount >= 10).length;

            totalHabitsEl.textContent = habits.length;
            totalWatersEl.textContent = totalWaters;
            totalTreesEl.textContent = totalTrees;
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        function setupEventListeners() {
            // Add habit
            addBtn.addEventListener('click', () => {
                addHabit(habitInput.value);
            });

            habitInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addHabit(habitInput.value);
                }
            });

            // Water and delete (event delegation)
            habitsGrid.addEventListener('click', (e) => {
                const card = e.target.closest('.habit-card');
                if (!card) return;

                const id = card.dataset.id;

                if (e.target.closest('.btn-water')) {
                    waterHabit(id);
                } else if (e.target.closest('.btn-delete')) {
                    deleteHabit(id);
                }
            });
        }

        // Initialize app
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden of Habits</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-atmosphere"></div>
    <div class="bg-pattern"></div>

    <div class="container">
        <header class="fade-in">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22V8"/>
                        <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
                        <path d="M12 8a5 5 0 0 0 0 6"/>
                        <path d="M12 8a5 5 0 0 1 0 6"/>
                    </svg>
                </div>
            </div>
            <h1>Garden of Habits</h1>
            <p class="subtitle">Cultiva tus habitos, crece con ellos</p>
        </header>

        <section class="input-section fade-in fade-in-delay-1" aria-label="Agregar nuevo habito">
            <div class="input-wrapper">
                <div class="input-field">
                    <input 
                        type="text" 
                        id="habitInput" 
                        placeholder="Escribe un nuevo habito..." 
                        aria-label="Nombre del habito"
                        maxlength="50"
                    >
                </div>
                <button class="btn-add" id="addBtn" aria-label="Agregar habito">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Plantar semilla
                </button>
            </div>
        </section>

        <div class="stats-bar fade-in fade-in-delay-2" id="statsBar">
            <div class="stat">
                <div class="stat-value" id="totalHabits">0</div>
                <div class="stat-label">Habitos</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalWaters">0</div>
                <div class="stat-label">Riegos</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalTrees">0</div>
                <div class="stat-label">Arboles</div>
            </div>
        </div>

        <section class="habits-section fade-in fade-in-delay-3">
            <h2>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 22V12a10 10 0 0 1 20 0v10"/>
                    <path d="M12 22V8"/>
                    <path d="M2 12a10 10 0 0 1 10 0"/>
                    <path d="M22 12a10 10 0 0 0-10 0"/>
                </svg>
                Tu jardin
            </h2>
            <div class="habits-grid" id="habitsGrid" role="list" aria-label="Lista de habitos">
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
